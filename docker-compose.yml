services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-taskyai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-taskyai}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: Host=db;Port=5432;Database=${DB_NAME:-taskyai};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      ASPNETCORE_ENVIRONMENT: Production
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiresInDays: ${JWT_EXPIRES_IN_DAYS:-30}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__BotUsername: ${TELEGRAM_BOT_USERNAME}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Google__RedirectUri: ${GOOGLE_REDIRECT_URI}
      GPTunnel__ApiKey: ${GPTUNNEL_API_KEY}
      Groq__ApiKey: ${GROQ_API_KEY}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://taskyai.ru,https://taskyai.ru,http://www.taskyai.ru,https://www.taskyai.ru}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
